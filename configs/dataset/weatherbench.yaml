# @package _global_
defaults:
  - override /model: unet_2d

data:
  dataset_name: WeatherBench
  data_path: /mnt/SSD2/constantin/data/weatherbench   # path to WeatherBench 1 directory (containing geopotential_500/, temperature_850/, ...)
  variables: [z500, t850]
  resolution: 64
  frames_per_step: 1        # stride in 6-hourly timesteps (1 = 6h, 4 = 24h)
  traj_length: 21           # 1 conditioning frame + 20 AR steps (5 days at 6-hourly)
  traj_stride: 20           # non-overlapping trajectories: [0,20], [20,40], …
  frames_per_time_step: 1
  limit_trajectories_train: -1
  limit_trajectories_val: -1
  batch_size: 64
  val_batch_size: 64

model:
  dimension: 2
  dataSize: [64, 128]
  condChannels: 2
  dataChannels: 2
  padding_mode: lonlat      # circular on longitude (periodic), zero on latitude (non-periodic)

pretraining:
  num_epochs: 101
  learning_rate_start: 1.0e-4
  learning_rate_end: 1.0e-4
  T_max: 101
  device: cuda
  epoch_sampling_frequency: 50

finetuning:
  num_epochs: 11
  learning_rate_start: 1.0e-4
  learning_rate_end: 1.0e-6
  T_max: 11
  device: cuda
  epoch_sampling_frequency: 10

loss:
  image_size: [64, 128]
  eval_traj_metrics: [mse, corr]
  primary_metric: corr

wandb:
  project: WeatherBench
