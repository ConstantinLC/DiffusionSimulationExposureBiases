# @package _global_
defaults:
  - override /model: unet_2d

data:
  dataset_name: KolmogorovFlow
  data_path: /mnt/SSD2/constantin/sda/data
  resolution: 64
  frames_per_step: 1
  traj_length: 64
  frames_per_time_step: 1
  limit_trajectories_train: 819
  limit_trajectories_val: 102
  batch_size: 64
  val_batch_size: 64

model:
  dimension: 2
  dataSize: [64, 64]
  condChannels: 2
  dataChannels: 2
  padding_mode: circular

pretraining:
  num_epochs: 501
  learning_rate_start: 1.0e-4
  learning_rate_end: 1.0e-6
  T_max: 501
  device: cuda
  epoch_sampling_frequency: 50

finetuning:
  num_epochs: 101
  learning_rate_start: 1.0e-4
  learning_rate_end: 1.0e-6
  T_max: 101
  device: cuda
  epoch_sampling_frequency: 50

loss:
  eval_traj_metrics: [mse, vort_corr]
  primary_metric: vort_corr

wandb:
  project: KolmogorovFlow
