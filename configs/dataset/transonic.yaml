# @package _global_
defaults:
  - override /model: acdm

data:
  dataset_name: TransonicFlow
  data_path: /mnt/SSD2/constantin/autoreg-pde-diffusion/data
  resolution: 64
  frames_per_step: 2
  traj_length: 64
  frames_per_time_step: 1
  limit_trajectories_train: -1
  limit_trajectories_val: -1
  batch_size: 64
  val_batch_size: 64

model:
  dimension: 2
  dataSize: [64, 64] #[128, 64]
  condChannels: 5
  dataChannels: 5
  padding_mode: zeros
  architecture: ACDM

pretraining:
  num_epochs: 1001
  learning_rate_start: 1.0e-4
  learning_rate_end: 1.0e-6
  T_max: 1001
  device: cuda
  epoch_sampling_frequency: 50

finetuning:
  num_epochs: 401
  learning_rate_start: 1.0e-4
  learning_rate_end: 1.0e-6
  T_max: 401
  device: cuda
  epoch_sampling_frequency: 50

loss:
  eval_traj_metrics: [mse]
  primary_metric: mse

wandb:
  project: TransonicFlow
