# @package _global_
defaults:
  - override /dataset: ks
  - override /model: refiner

checkpoint_dir: ./checkpoints/KuramotoSivashinsky/single_sigma/

data:
  prediction_steps: 1

model:
  refinementSteps: 1
  log_sigma_min: -2.0  # overridden per run, e.g. -2.5

pretraining:
  num_epochs: 501
  learning_rate_start: 1.0e-4
  learning_rate_end: 1.0e-6
  T_max: 501
  device: cuda
  epoch_sampling_frequency: 50

wandb:
  project: KuramotoSivashinsky-single-sigma
