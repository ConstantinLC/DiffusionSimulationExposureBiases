# @package _global_
# Instability threshold experiment for Kuramoto-Sivashinsky (Figure 2)
defaults:
  - override /dataset: ks
  - override /model: diffusion

checkpoint_dir: ./checkpoints/KuramotoSivashinsky/instability_threshold

data:
  prediction_steps: 1
  batch_size: 64
  val_batch_size: 512

model:
  dimension: 1
  dataSize: [64]
  condChannels: 1
  dataChannels: 1
  diffSchedule: log_linear
  diffSteps: 20
  padding_mode: circular

pretraining:
  num_epochs: 500
  learning_rate_start: 1.0e-4
  learning_rate_end: 1.0e-6
  T_max: 500
  epoch_sampling_frequency: 50
  track_instability: true
  n_noise_samples: 10
  validate_every_k: 50
