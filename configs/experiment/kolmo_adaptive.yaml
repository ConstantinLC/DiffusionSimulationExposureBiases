# @package _global_
defaults:
  - override /dataset: kolmogorov

checkpoint_dir: ./checkpoints/KolmogorovFlow/adaptive/

training:
  num_epochs: 401
  learning_rate_start: 1.0e-4
  learning_rate_end: 1.0e-6
  T_max: 401
  device: cuda
  epoch_sampling_frequency: 100
  binary_search_steps: 5
  finetuning_steps: 5
  perform_binary_search: false
  best_log_sigma: -1.875
  tau: 1.05
