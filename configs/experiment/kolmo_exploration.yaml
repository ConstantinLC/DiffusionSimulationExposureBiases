# @package _global_
defaults:
  - override /dataset: kolmogorov

checkpoint_dir: ./checkpoints/KolmogorovFlow/exploration/

training:
  num_epochs: 801
  learning_rate_start: 1.0e-4
  learning_rate_end: 1.0e-6
  T_max: 801
  device: cuda
  epoch_sampling_frequency: 20
  channels_per_frame: 2
  first_ar_step_noising_step_limit: 5
  backgrad: false
  n_proxy_steps: 2
  tau: 1.05

model:
  diffSchedule: initial_exploration
  diffSteps: 100
  checkpoint: /mnt/SSD2/constantin/diffusion-multisteps/checkpoints/KolmogorovFlow/exploration/run_31/adaptive_pruned_epoch_37.pt
  load_betas: false

loss:
  eval_traj_metrics: [mse]
  primary_metric: mse

wandb:
  project: KolmogorovFlow
  name: dry-run