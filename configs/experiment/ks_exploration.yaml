# @package _global_
# Phase 1: Exploration for Kuramoto-Sivashinsky
# Trains on a dense log-uniform schedule, progressively removing noise levels
# as they satisfy B_own(sigma) <= tau. Saves a per-level checkpoint for each
# solved sigma so Phase 2 (greedy schedule construction) can reuse them.
#
# Usage:
#   python train_exploration.py +experiment=ks_exploration
defaults:
  - override /dataset: ks
  - override /model: diffusion

checkpoint_dir: ./checkpoints/KuramotoSivashinsky/exploration

data:
  prediction_steps: 1
  batch_size: 64
  val_batch_size: 256

model:
  diffSchedule: linear
  diffSteps: 40

training:
  device: cuda
  num_epochs: 1000   # max_passes * epochs_per_pass (not used directly, satisfies schema)
  T_max: 1000
  tau: 1.05
  log_sigma_min: -3.0
  log_sigma_max: -0.0001
  n_exploration_levels: 100
  epochs_per_pass: 1000
  eval_every_epoch: 50
  max_passes: 1
  n_eval_batches: 30
  learning_rate_start: 1.0e-4
  learning_rate_end: 1.0e-6